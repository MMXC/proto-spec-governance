<!DOCTYPE html>
<html lang="zh" data-host="sidepanel">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="manifest.open_at_install" content="false" />
  <title>Proto Spec 治理</title>
</head>
<body class="proto-body">
  <div class="proto-shell" id="proto-shell" data-work-mode="governance">
    <!-- 顶层：工作模式 + 扩展设置 -->
    <header class="proto-topbar">
      <nav class="proto-modes" id="proto-modes" aria-label="工作模式">
        <button type="button" class="proto-mode is-active" data-mode="governance" id="mode-governance">治理</button>
        <button type="button" class="proto-mode" data-mode="browse" id="mode-browse">浏览</button>
        <button type="button" class="proto-mode" data-mode="debug" id="mode-debug">调试</button>
      </nav>
      <button type="button" class="proto-settings-btn" id="btn-open-settings" title="扩展设置">⚙</button>
    </header>

    <!-- 中部：左 Spec 抽屉 | 右 Agent -->
    <div class="proto-workspace">
      <aside class="proto-spec-drawer" id="spec-drawer" aria-label="Spec 治理">
        <div class="proto-spec-rail" aria-hidden="true"></div>
        <button type="button" class="proto-spec-collapse" id="btn-spec-drawer-toggle" title="折叠 / 展开 Spec 栏" aria-expanded="true">⟨</button>
        <div class="proto-spec-body">
          <div class="tree" id="tree">
            <div class="tree-hdr">
              <span>Spec 树</span>
              <button class="btn-icon" id="btn-add-spec" title="新建 Spec">+</button>
            </div>
            <div class="tree-list" id="tree-list"></div>
          </div>
          <div class="actions" id="actions">
            <div class="act-spec" id="act-spec">
              <span class="act-label">当前选中</span>
              <span class="act-val" id="act-spec-name">—</span>
            </div>
            <div class="act-row">
              <button class="act-btn" id="btn-highlight" title="高亮页面元素">
                <span class="act-icon">✦</span>
                <span>高亮</span>
              </button>
              <button class="act-btn" id="btn-annotate" title="显示/隐藏标注">
                <span class="act-icon">📍</span>
                <span>标注</span>
              </button>
              <button class="act-btn" id="btn-onboard" title="Onboard 演示">
                <span class="act-icon">🎯</span>
                <span>引导</span>
              </button>
            </div>
            <div class="act-row">
              <button class="act-btn" id="btn-bind" title="绑定当前 Spec 到元素">
                <span class="act-icon">⊕</span>
                <span>绑定</span>
              </button>
              <button class="act-btn" id="btn-theme" title="切换页面主题">
                <span class="act-icon">🌓</span>
                <span>主题</span>
              </button>
              <button class="act-btn" id="btn-refresh" title="刷新页面">
                <span class="act-icon">↻</span>
                <span>刷新</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <section class="proto-agent" aria-label="Agent 交互">
        <div class="proto-agent-head">
          <span class="proto-agent-title">Agent</span>
          <span class="proto-agent-hint">与页面 runtime 协同（占位对接）</span>
        </div>
        <div class="proto-agent-thread" id="agent-thread"></div>
        <div class="proto-agent-compose">
          <textarea id="agent-input" rows="2" placeholder="输入指令或问题，Enter 发送…" spellcheck="false"></textarea>
          <button type="button" class="proto-agent-send" id="agent-send">发送</button>
        </div>
      </section>
    </div>

    <!-- 底部 Dock：数据 | 状态 | 事件中心 -->
    <footer class="proto-dock" id="proto-dock">
      <div class="proto-dock-tabs" role="tablist">
        <button type="button" class="proto-dock-tab is-active" role="tab" data-dock-tab="data" id="dock-tab-data" aria-selected="true">数据</button>
        <button type="button" class="proto-dock-tab" role="tab" data-dock-tab="status" id="dock-tab-status" aria-selected="false">状态</button>
        <button type="button" class="proto-dock-tab" role="tab" data-dock-tab="events" id="dock-tab-events" aria-selected="false">
          事件中心 <span class="proto-badge" id="log-count">0</span>
        </button>
      </div>
      <div class="proto-dock-body">
        <div class="proto-dock-panel is-active" role="tabpanel" data-dock-panel="data" id="panel-data">
          <p class="proto-muted">页面绑定数据、校验快照将在此聚合。</p>
          <pre class="proto-data-block" id="data-preview">暂无数据视图</pre>
        </div>
        <div class="proto-dock-panel" role="tabpanel" data-dock-panel="status" id="dock-panel-status">
          <div class="proto-status-row">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">初始化中…</span>
          </div>
          <p class="proto-muted" id="status-extra">扩展 → Content → 页面 PostMessage / Runtime</p>
        </div>
        <div class="proto-dock-panel" role="tabpanel" data-dock-panel="events" id="dock-panel-events">
          <div class="log-list log-list--dock" id="log-list"></div>
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
